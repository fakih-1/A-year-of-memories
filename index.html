<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A year of memories 💗</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;600&family=Playfair+Display:wght@500;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family:'Montserrat', sans-serif;
  background: linear-gradient(135deg,#fdf2f4,#fce7eb,#f8d7dc);
  overflow:hidden;
}
.love-heart {
  position:absolute;
  color:#ff7bac;
  z-index:2;
  pointer-events:none;
}
@keyframes floatHeart {
  0% {transform:translateY(100vh) scale(0.3); opacity:0;}
  10% {opacity:0.8; transform:translateY(90vh) scale(0.6);}
  100% {transform:translateY(-120vh) scale(1); opacity:0;}
}
#game-screen {
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  transition:all 0.5s ease;
}
.game-bg {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}
.overlay {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.65);
}
.game-box {
  position:relative;
  z-index:2;
  width:340px;
  text-align:center;
  color:white;
  padding:25px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  border:2px solid rgba(255,255,255,0.4);
  animation:borderGlow 2s infinite alternate;
}
.blur {
  filter: blur(12px);
  transform: scale(0.95);
}
@keyframes borderGlow {
  0% {box-shadow:0 0 10px rgba(255,120,170,0.4);}
  100% {box-shadow:0 0 25px rgba(255,120,170,0.9);}
}
.game-title {
  font-family:'Great Vibes', cursive;
  font-size:36px;
}
.game-input {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  text-align:center;
  color:black;
  font-weight:bold;
  margin-top:5px;
}
.game-btn {
  margin-top:12px;
  width:100%;
  padding:12px;
  border-radius:12px;
  background:#ff4d87;
  color:white;
  font-weight:bold;
}

#countdown {
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:120px;
  font-weight:bold;
  color:black;
  font-family:'Poppins', sans-serif;
  z-index:10001;
  opacity:0;
  transition:all 0.5s ease;
  pointer-events:none;
}

#rose-transition {
  position:fixed;
  inset:0;
  background:black;
  display:none;
  z-index:10000;
  opacity:0;
  transition:opacity 0.8s ease;
}
#rose-transition.active {opacity:1;}
#rose-transition video {
  width:100%;
  height:100%;
  object-fit:cover;
}
#slideshow {
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  overflow:hidden;
}

.fade-out {
  opacity:0 !important;
  transform:scale(0.95) !important;
  transition:all 0.8s ease;
}

.slide-bg {
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  filter:blur(25px) brightness(1.2);
  transform:scale(1.1);
  z-index:1;
  opacity:0;
  transition:opacity 1s ease;
}
.slide-bg.active {opacity:1;}

.slide-media {
  position:relative;
  z-index:3; 
  max-width:85%;
  max-height:70%;
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
  opacity:0;
  transform:translateY(30px) scale(0.95);
  transition:all 1s ease;
}
.slide-media.active {opacity:1; transform:translateY(0) scale(1);}

.slide-text {
  position:relative;
  z-index:4; 
  margin-top:10px;
  color:black;
  font-size:20px;
  text-align:center;
  max-width:80%;
  font-family:'Playfair Display', serif;
  opacity:0;
  transform:translateY(30px) scale(0.95);
  transition:all 1s ease;
}
.slide-text.active {
  opacity:1;
  transform:translateY(0) scale(1);
}

.special-text {
  position:absolute;
  z-index:5;
  font-family:'Great Vibes', cursive;
  font-size:48px;
  color:#ff4d87;
  text-align:center;
  opacity:0;
  transform:scale(0.8);
  transition:all 1s ease;
}
.special-text.active {
  opacity:1;
  transform:scale(1);
}
</style>
</head>
<body>

<div id="game-screen">
  <img src="images\1.png" class="game-bg">
  <div class="overlay"></div>

  <div class="game-box" id="game-box">
    <div class="game-title">Cerdas Cermat 😗</div>
    <p>Jawab 3 soal dengan benar</p>

    <div id="question" style="margin:10px 0;"></div>
    <input id="answer" class="game-input">
    <button onclick="checkAnswer()" class="game-btn">Jawab</button>

    <p style="margin-top:10px;">Skor: <span id="score">0</span>/3</p>
    <p id="feedback" style="margin-top:5px;"></p>
  </div>
</div>

<div id="countdown"></div>

<div id="rose-transition">
  <video id="rose-video" src="video\11.mp4"></video>
</div>

<div id="slideshow"></div>

<audio id="bg-music" loop src="audio\1.mp3"></audio>
<audio id="sound-correct" src="audio\2.mpeg"></audio>
<audio id="sound-wrong" src="audio\3.mpeg"></audio>

<script>
function createLove(){
  const h = document.createElement('div');
  h.className = 'love-heart';
  h.innerText = '💗';
  h.style.left = Math.random() * 90 + '%';
  h.style.top = Math.random() * 80 + '%';
  h.style.fontSize = (14 + Math.random()*20) + 'px';
  h.style.animation = `floatHeart ${3 + Math.random()*2}s linear forwards`;
  document.getElementById("slideshow").appendChild(h);
  setTimeout(() => h.remove(), 5000);
}

setInterval(createLove, 300);

const questions = [
  {q:"1+1=",a:"2"},
  {q:"11×11=",a:"121"},
  {q:"12×12=",a:"144"}
];
let current = 0, score = 0;

function loadQuestion(){
  document.getElementById("question").innerText = questions[current].q;
}

function checkAnswer(){
  const input = document.getElementById("answer");
  const val = input.value.toLowerCase();
  input.value = "";

  if(val === questions[current].a){
    document.getElementById("sound-correct").play();
    score++;
    document.getElementById("score").innerText = score;
    current++;

    if(score >= 3){
      startCountdown();
      return;
    }

    loadQuestion();
  } else {
    document.getElementById("sound-wrong").play();
  }
}

function startCountdown(){
  const gameScreen = document.getElementById("game-screen");
  const countdown = document.getElementById("countdown");

  gameScreen.classList.add("blur");

  let num = 3;
  countdown.style.opacity = 1;
  countdown.innerText = num;

  let interval = setInterval(()=>{
    num--;

    if(num > 0){
      countdown.innerText = num;
      countdown.style.transform = "scale(1.3)";
      setTimeout(()=>countdown.style.transform="scale(1)",200);

    } else {
      clearInterval(interval);

      countdown.innerHTML = "Selamat<br>menikmati";
      countdown.style.transform = "scale(2.2)";
      countdown.style.fontSize = "clamp(28px, 6vw, 70px)";
      countdown.style.lineHeight = "0.9"; 
      countdown.style.fontFamily = "'Great Vibes', cursive"; 

      setTimeout(()=>{
        countdown.style.opacity = 0;
        finishGame();
      },900);
    }

  },1000);
}

function finishGame(){
  document.getElementById("game-screen").style.display = "none";
  const trans = document.getElementById("rose-transition");
  const video = document.getElementById("rose-video");

  trans.style.display = "block";
  setTimeout(()=>trans.classList.add("active"),50);
  video.play();

  video.onended = () => {
    trans.style.display = "none";
    startSlideshow();
    document.getElementById("bg-music").play();
  }
}

loadQuestion();

function startSlideshow(){
  const container = document.getElementById("slideshow");
  container.style.display = "flex";

  const slides = [
    { src: "images\\5 Mei 2025.jpeg", text: "5 Mei 2025 🗓️" },
    { src: "images\\5 Juli 2025.jpeg", text: "5 Juli 2025 🗓️" },
    { src: "images\\30 Juli 2025.jpeg", text: "30 Juli 2025 🗓️" },
    { src: "images\\6 Oktober 2025.jpeg", text: "6 Oktober 2025 🗓️" },
    { src: "images\\11 oktober 2025.jpeg", text: "11 Oktober 2025 🗓️" },
    { src: "images\\20 oktober 2025.jpeg", text: "20 Oktober 2025 🗓️" },
    { src: "images\\11 november 2025.jpeg", text: "11 November 2025 🗓️" },
    { src: "images\\21 november 2025.jpeg", text: "21 November 2025 🗓️" },
    { src: "images\\29 november 2025.jpeg", text: "29 November 2025 🗓️" },
    { src: "images\\11 desember 2025.jpeg", text: "11 Desember 2025 🗓️" },
    { src: "images\\31 Desember 2025.jpeg", text: "31 Desember 2025 🗓️" },
    { src: "video\\2.mp4", text: "Ceritanya lagi belanja bulanan 😌" },
    { src: "video\\3.mp4", text: "Jakarta Fair 2025 🙂‍↔️🙂‍↔️🙂‍↔️" },
    { src: "video\\12.mp4", text: "Keliling ragunan naik sepeda 🚴🏻🦁" },
    { src: "video\\13.mp4", text: "Uji adrenalin dikit naik wahana wave racer di TSM cibubur 😦😵‍💫" },
    { src: "video\\14.mp4", text: "Cerita nya lagi jadi pembalap F1 🏎️" },
    { src: "video\\4.mp4", text: "Pulang dari dinner merayakan ulang tahun umi 🥳🎉" },
    { src: "video\\5.mp4", text: "Piknik di taman langsat 🤠" },
    { src: "video\\6.mp4", text: "Photo box di blok m 😗" },
    { src: "video\\7.mp4", text: "Photo box di hari ulang tahun nya dia yang ke 20 🥳🎉" },
    { src: "video\\8.mp4", text: "Di Basement parkiran, baru selesai nonton bioskop 😯😯😯" },
    { src: "video\\9.mp4", text: "Di parkiran ancol, baru keluar dari dufan 🫣" },
  ];

  let i = 0;

  function show(){
    let slide = slides[i];

    const old = container.querySelectorAll('.slide-bg, .slide-media, .slide-text');
    old.forEach(el => el.classList.add("fade-out"));

    setTimeout(()=>{

      container.querySelectorAll('.slide-bg, .slide-media, .slide-text, .special-text').forEach(n => n.remove());

      if(i === 0){
        let special = document.createElement("div");
        special.className = "special-text";
        special.innerText = "A year of memories 💗";
        container.appendChild(special);

        setTimeout(()=>special.classList.add("active"),100);

        setTimeout(()=>{
          i++;
          show();
        },2500);

        return;
      }

      let bg = document.createElement("div");
      bg.className = "slide-bg";
      bg.style.backgroundImage = `url(${slide.src})`;

      let media;
      if(slide.src.includes(".mp4")){
        media = document.createElement("video");
        media.src = slide.src;
        media.autoplay = true;
        media.muted = true;
      } else {
        media = document.createElement("img");
        media.src = slide.src;
      }
      media.className = "slide-media";

      let text = document.createElement("div");
      text.className = "slide-text";
      text.innerText = slide.text;

      container.append(bg, media, text);

      setTimeout(()=>{
        bg.classList.add("active");
        media.classList.add("active");
        text.classList.add("active");
      },100);

      if(media.tagName === "VIDEO"){
        media.onended = next;
      } else {
        setTimeout(next, 4000);
      }

    },800);
  }

  function next(){
    i = (i + 1) % slides.length;
    show();
  }

  show();
}
</script>

</body>
</html>
